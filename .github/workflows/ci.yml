name: CI
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [feature/**]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Type check
        run: npm run check
      - name: Build
        run: npm run build
      - name: Report build size
        run: |
          du -sh dist/
          echo "HTML pages:"
          find dist -name '*.html' | wc -l
          echo "Largest JS bundles:"
          find dist -name '*.js' -exec du -h {} + | sort -h | tail -5
