<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Catalogue — Kervan Heat</title>
<meta name="description" content="Kervan Heat product catalogue. Hydraulic breaker spare parts and heat treatment services — chisels, pistons, bushings, through bolts, repair kits for 40+ breaker brands.">
<link rel="canonical" href="https://kervanheat.com/katalog">
<meta name="robots" content="index, follow">
<meta property="og:type" content="website">
<meta property="og:url" content="https://kervanheat.com/katalog">
<meta property="og:title" content="Product Catalogue — Kervan Heat">
<meta property="og:description" content="Hydraulic breaker spare parts and heat treatment services — chisels, pistons, bushings, through bolts, repair kits for 40+ breaker brands.">
<meta property="og:image" content="https://kervanheat.com/hero.jpg">
<meta name="theme-color" content="#08090B">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#E8781A;--brand-hi:#FF8A2B;--brand-lo:#B85810;
  --bg-0:#08090B;--bg-1:#0E1014;--bg-2:#151821;--bg-3:#1C2029;
  --t-1:#F5F6F8;--t-2:#A8ADB8;--t-3:#6B7280;
  --line:rgba(255,255,255,.08);--line-2:rgba(255,255,255,.14);
  --f-body:'Inter',system-ui,sans-serif;
  --f-head:'Space Grotesk','Inter',sans-serif;
  --f-mono:'JetBrains Mono',ui-monospace,monospace;
  --r-md:8px;--r-lg:14px;--r-xl:22px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--f-body);background:var(--bg-0);color:var(--t-1);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;border:0;background:0;color:inherit}
::selection{background:var(--brand);color:#0A0B0D}

/* ═══ NAV ═══ */
.nav{position:sticky;top:0;z-index:100;background:rgba(8,9,11,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line);height:68px}
.nav__in{max-width:1280px;margin:0 auto;padding:0 24px;height:100%;display:flex;justify-content:space-between;align-items:center}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--f-head);font-weight:700}
.brand__mark{width:32px;height:32px;border-radius:6px;background:linear-gradient(145deg,var(--brand-hi),var(--brand-lo));display:grid;place-items:center;font-size:14px;color:#0A0B0D;box-shadow:0 0 18px rgba(232,120,26,.35)}
.brand__text{font-size:15px;color:var(--t-1)}
.brand__text b{color:var(--brand)}
.nav__back{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:var(--t-2);transition:color .2s}
.nav__back:hover{color:var(--brand)}
.nav__back svg{width:16px;height:16px}

/* ═══ MAIN ═══ */
main{flex:1;max-width:1280px;margin:0 auto;width:100%;padding:64px 24px 96px}
.eyebrow{display:inline-flex;align-items:center;gap:10px;font-family:var(--f-mono);font-size:11px;font-weight:500;color:var(--brand);letter-spacing:.14em;text-transform:uppercase;padding:7px 12px;border:1px solid rgba(232,120,26,.3);border-radius:999px;background:rgba(232,120,26,.06);margin-bottom:22px}
.eyebrow::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--brand);box-shadow:0 0 12px var(--brand)}
.page-title{font-family:var(--f-head);font-size:clamp(30px,4.5vw,50px);font-weight:600;line-height:1.06;letter-spacing:-.028em;margin-bottom:16px}
.page-desc{font-size:16px;color:var(--t-2);line-height:1.65;margin-bottom:48px;max-width:560px}

/* ═══ PDF VIEWER ═══ */
.katalog-frame{border-radius:var(--r-xl);overflow:hidden;border:1px solid var(--line-2);background:var(--bg-2);max-width:920px;position:relative}
.katalog-frame::before{content:"";position:absolute;top:-1px;left:22px;right:22px;height:2px;background:linear-gradient(90deg,var(--brand),transparent 65%)}
.katalog-frame iframe{width:100%;height:82vh;min-height:500px;border:none;display:block}

/* ═══ QUOTE SECTION ═══ */
.quote-section{max-width:920px;margin-top:72px}
.quote-title{font-family:var(--f-head);font-size:clamp(24px,3.5vw,36px);font-weight:600;line-height:1.1;letter-spacing:-.02em;margin-bottom:32px}
.quote-title em{font-style:normal;background:linear-gradient(120deg,var(--brand-hi),var(--brand));-webkit-background-clip:text;background-clip:text;color:transparent}
.quote-card{position:relative;background:linear-gradient(165deg,var(--bg-2),var(--bg-1));border:1px solid var(--line);border-radius:var(--r-xl);padding:40px;overflow:hidden}
.quote-card::before{content:"";position:absolute;top:0;left:40px;right:40px;height:2px;background:linear-gradient(90deg,var(--brand),transparent 65%)}
.q-form{display:flex;flex-direction:column;gap:16px}
.q-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.q-field{display:flex;flex-direction:column;gap:7px}
.q-label{font-family:var(--f-mono);font-size:10px;font-weight:500;color:var(--t-3);letter-spacing:.12em;text-transform:uppercase}
.q-label span{color:var(--brand)}
.q-input,.q-textarea{width:100%;padding:13px 14px;background:var(--bg-1);border:1px solid var(--line);border-radius:var(--r-md);font:inherit;color:var(--t-1);font-size:14px;transition:border-color .2s,box-shadow .2s}
.q-input::placeholder,.q-textarea::placeholder{color:var(--t-3)}
.q-input:focus,.q-textarea:focus{outline:0;border-color:var(--brand);box-shadow:0 0 0 4px rgba(232,120,26,.12)}
.q-textarea{resize:vertical;min-height:100px}
.q-submit{display:inline-flex;align-items:center;gap:10px;background:var(--brand);color:#0A0B0D;border:1px solid var(--brand);padding:14px 28px;border-radius:10px;font-size:14px;font-weight:600;transition:background .2s,box-shadow .2s,transform .2s;margin-top:6px;cursor:pointer}
.q-submit:hover{background:var(--brand-hi);box-shadow:0 12px 40px rgba(232,120,26,.3);transform:translateY(-2px)}
.q-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.q-submit svg{width:16px;height:16px}
.q-status{margin-top:8px;font-family:var(--f-mono);font-size:11px;color:var(--t-3);letter-spacing:.04em;min-height:16px}
.q-status--ok{color:var(--brand)}
.q-status--err{color:#F87171}

/* ═══ FOOTER ═══ */
footer{padding:32px 24px;border-top:1px solid var(--line);text-align:center;font-family:var(--f-mono);font-size:10px;color:var(--t-3);letter-spacing:.1em;text-transform:uppercase}
footer b{color:var(--t-1);font-weight:500}

@media(max-width:768px){
  main{padding:40px 20px 64px}
  .katalog-frame iframe{height:60vh;min-height:380px}
  .quote-card{padding:28px 22px}
  .q-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav__in">
    <a href="/" class="brand" aria-label="Kervan Heat">
      <span class="brand__mark">K</span>
      <span class="brand__text">KERVAN<b>HEAT</b></span>
    </a>
    <a href="/" class="nav__back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      <span data-i18n="kat_back">Homepage</span>
    </a>
  </div>
</nav>

<main>
  <div class="eyebrow" data-i18n="kat_eyebrow">Catalogue</div>
  <h1 class="page-title" data-i18n="kat_title">Product Catalogue</h1>
  <p class="page-desc" data-i18n="kat_desc">Hydraulic breaker spare parts and heat treatment services — technical specifications, dimensions and product range.</p>

  <div class="katalog-frame">
    <iframe
      src="https://docs.google.com/viewer?url=https://kervanheat.com/katalog.pdf&embedded=true"
      title="Kervan Heat Product Catalogue"
      loading="lazy"
    ></iframe>
  </div>

  <section class="quote-section">
    <div class="eyebrow" data-i18n="kat_q_eyebrow">Request a Quote</div>
    <h2 class="quote-title" data-i18n-html="kat_q_title">Get a <em>Quote</em></h2>

    <div class="quote-card">
      <form class="q-form" id="kat-form" action="https://api.web3forms.com/submit" method="POST" novalidate>
        <input type="hidden" name="access_key" value="8f55e1c5-b170-4414-9ceb-477cbf6fca58">
        <input type="hidden" name="subject" value="KVN · Catalogue Page Quote Request">
        <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off">

        <div class="q-row">
          <div class="q-field">
            <label class="q-label" for="kf-name"><span data-i18n="kat_f_name">Full Name</span> <span>*</span></label>
            <input class="q-input" type="text" id="kf-name" name="name" required placeholder="e.g. John Smith" data-i18n-ph="kat_f_name_ph">
          </div>
          <div class="q-field">
            <label class="q-label" for="kf-phone"><span data-i18n="kat_f_phone">Phone / WhatsApp</span> <span>*</span></label>
            <input class="q-input" type="tel" id="kf-phone" name="phone" required placeholder="+90 531 669 37 34" data-i18n-ph="kat_f_phone_ph">
          </div>
        </div>
        <div class="q-field">
          <label class="q-label" for="kf-email"><span data-i18n="kat_f_email">Email</span> <span>*</span></label>
          <input class="q-input" type="email" id="kf-email" name="email" required placeholder="you@company.com" data-i18n-ph="kat_f_email_ph">
        </div>
        <div class="q-field">
          <label class="q-label" for="kf-note"><span data-i18n="kat_f_detail">Request Details</span></label>
          <textarea class="q-textarea" id="kf-note" name="details" maxlength="1000" placeholder="Part type, breaker model, quantity, dimensions…" data-i18n-ph="kat_f_detail_ph"></textarea>
        </div>
        <button type="submit" class="q-submit" id="kat-btn">
          <span data-i18n="kat_f_submit">Send Request</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </button>
      </form>
      <div class="q-status" id="kat-status" aria-live="polite"></div>
    </div>
  </section>
</main>

<footer><span data-i18n-html="kat_footer_html">© 2026 <b>Kervan Isıl İşlem Ltd. Şti.</b> · kervanheat.com</span></footer>

<script>
(function(){
  var T={en:{
    kat_back:"Homepage",kat_eyebrow:"Catalogue",kat_title:"Product Catalogue",
    kat_desc:"Hydraulic breaker spare parts and heat treatment services \u2014 technical specifications, dimensions and product range.",
    kat_q_eyebrow:"Request a Quote",kat_q_title:'Get a <em>Quote</em>',
    kat_f_name:"Full Name",kat_f_phone:"Phone / WhatsApp",kat_f_email:"Email",kat_f_detail:"Request Details",
    kat_f_name_ph:"e.g. John Smith",kat_f_phone_ph:"+90 531 669 37 34",kat_f_email_ph:"you@company.com",
    kat_f_detail_ph:"Part type, breaker model, quantity, dimensions\u2026",kat_f_submit:"Send Request",
    kat_footer_html:'\u00a9 2026 <b>Kervan Is\u0131l \u0130\u015flem Ltd. \u015eti.</b> \u00b7 kervanheat.com',
    kat_sending:"Sending\u2026",kat_ok:"Thanks! We\u2019ll reply within 24 hours.",kat_err:"Could not send. Please email info@kervanheat.com"
  },tr:{
    kat_back:"Ana Sayfa",kat_eyebrow:"Katalog",kat_title:"\u00dcr\u00fcn Katalo\u011fu",
    kat_desc:"Hidrolik k\u0131r\u0131c\u0131 yedek par\u00e7alar\u0131 ve \u0131s\u0131l i\u015flem hizmetleri \u2014 teknik \u00f6zellikler, boyutlar ve \u00fcr\u00fcn yelpazesi.",
    kat_q_eyebrow:"Teklif Al",kat_q_title:'Teklif <em>Al\u0131n</em>',
    kat_f_name:"Ad Soyad",kat_f_phone:"Telefon / WhatsApp",kat_f_email:"E-posta",kat_f_detail:"Talep Detay\u0131",
    kat_f_name_ph:"\u00f6rn. Mehmet Y\u0131lmaz",kat_f_phone_ph:"+90 531 669 37 34",kat_f_email_ph:"siz@firma.com",
    kat_f_detail_ph:"Par\u00e7a tipi, k\u0131r\u0131c\u0131 model, adet, boyut\u2026",kat_f_submit:"Talebi G\u00f6nder",
    kat_footer_html:'\u00a9 2026 <b>Kervan Is\u0131l \u0130\u015flem Ltd. \u015eti.</b> \u00b7 kervanheat.com',
    kat_sending:"G\u00f6nderiliyor\u2026",kat_ok:"Te\u015fekk\u00fcrler! 24 saat i\u00e7inde d\u00f6n\u00fc\u015f yapaca\u011f\u0131z.",kat_err:"G\u00f6nderilemedi. info@kervanheat.com adresine yaz\u0131n."
  }};
  var lang='en',userOverride=false;
  function apply(next){
    lang=next;var d=T[lang];document.documentElement.lang=lang;
    document.querySelectorAll('[data-i18n]').forEach(function(el){var k=el.getAttribute('data-i18n');if(d[k]!==undefined)el.textContent=d[k];});
    document.querySelectorAll('[data-i18n-html]').forEach(function(el){var k=el.getAttribute('data-i18n-html');if(d[k]!==undefined)el.innerHTML=d[k];});
    document.querySelectorAll('[data-i18n-ph]').forEach(function(el){var k=el.getAttribute('data-i18n-ph');if(d[k]!==undefined)el.setAttribute('placeholder',d[k]);});
  }
  var nav=(navigator.language||'').toLowerCase();
  if(nav.indexOf('tr')===0){apply('tr');}else{
    apply('en');
    try{fetch('https://ipapi.co/json/',{cache:'force-cache'}).then(function(r){return r.ok?r.json():null;}).then(function(data){if(data&&data.country_code==='TR'&&!userOverride&&lang!=='tr')apply('tr');}).catch(function(){});}catch(e){}
  }

  var form=document.getElementById('kat-form');
  var btn=document.getElementById('kat-btn');
  var status=document.getElementById('kat-status');
  if(!form) return;
  form.addEventListener('submit',function(e){
    e.preventDefault();
    var d=T[lang];
    btn.disabled=true;
    status.textContent=d.kat_sending;
    status.className='q-status';
    fetch('https://api.web3forms.com/submit',{method:'POST',headers:{'Accept':'application/json'},body:new FormData(form)})
      .then(function(r){return r.json();})
      .then(function(res){
        if(res.success){
          status.textContent=d.kat_ok;
          status.className='q-status q-status--ok';
          form.reset();
        }else{throw new Error('fail');}
      })
      .catch(function(){
        status.textContent=d.kat_err;
        status.className='q-status q-status--err';
      })
      .finally(function(){btn.disabled=false;});
  });
})();
</script>
</body>
</html>
